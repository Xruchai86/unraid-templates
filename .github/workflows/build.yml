# Universeller Build-&-Push-Workflow -> GitHub Container Registry (GHCR).
# Identisch fuer JEDE App: in das jeweilige App-Repo unter .github/workflows/build.yml legen.
# Image-Name wird automatisch aus dem Repo abgeleitet: ghcr.io/<owner>/<repo>
name: build-and-push
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatisch, kein PAT noetig
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # wird klein geschrieben
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
